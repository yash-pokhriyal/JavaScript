<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myntra bag</title>
    <link rel="stylesheet" href="myntra_bag.css">
</head>
<body>
    <button class="bag-btn" onclick="cartQuantity++;
    document.querySelector('#card-summary').innerText = `Your Bag have ${cartQuantity} items`
    ">Add to Bag</button>
    <button class="wish-btn" onclick="cartQuantity-=1;document.querySelector('#card-summary').innerText = `Your Bag have ${cartQuantity} items`">Wishlist ❤️</button>

    <button class="bag-btn" onclick="cartQuantity+=2;
    document.querySelector('#card-summary').innerText = `Your Bag have ${cartQuantity} items`">Add to 1+1 sale item</button>

    <h1 id="card-summary"></h1>


    <script>
        let cartQuantity = 0;
        document.querySelector('#card-summary').innerText = `Your Bag have ${cartQuantity} items`

    </script>

</body>
</html>
