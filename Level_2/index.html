<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variables</title>
</head>
<body>
    <script>
        // Variables
        let welcomeMsg = 'hello world';
        console.log(welcomeMsg);

        // cannot use keyword as variable
        // cannot start with number
        // no special character other than $ and _
        //  = for assignment
        let $name='yash'
        console.log(`Hello ${$name}`)

        // Updating values

        let noOfStudents = 5
        noOfStudents+=5;
        console.log(noOfStudents);
        noOfStudents-=2;
        console.log(noOfStudents);
        noOfStudents*=2;
        console.log(noOfStudents);
         noOfStudents/=2;
         console.log(noOfStudents);
         noOfStudents%=2;
         console.log(noOfStudents);

        let money = 1;
        money++;
        console.log(money);


        //  No need to use let again

        const pi = 3.14159;
        // value of const varibale cannot be updated

        






    </script>
</body>
</html>
