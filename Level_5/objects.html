<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object</title>
</head>
<body>
    

    <script>
        let product = {
         company:'Mango',
         price:861,
         'item_name': 'T-shirt',
         rating:{
            stars:4.5,
            noOfReviews:87
         },
         displayPrice:function(){
            return `${this.price}`
         }
        };
        console.log(product)
        console.log(product.company)
        console.log(product.price)
        console.log(product.item_name)

        product.company = 'Banana';
        console.log(product)

        console.log(product['company'])

        // delete
        delete product.company;
        console.log(product)

        console.log(product.displayPrice())

        // autoboxing :automatic conversion of primitives to object 
        // allows properties and methods to be used on primitives
        console.log('This is KG coding'.length)
        console.log('This is KG coding'.toUpperCase())
        console.log('This is KG coding'.replace('KG','Knowledge Gate'))



        // Pass by value and reference

        let a = 5;
        let b = a;
        console.log(a,b)
        a=2;
        console.log(a,b)

        // yhan copy ke baad dono ek dusre se lag hai
        let x = {num:5};
        let y=x;
        console.log(x.num,y.num)
        x.num = 8;
        console.log(x.num,y.num)

        // yhan reference hai 

        let p  = {
            pop:'iujh',
        }
        let q = {
            pop:'iujh',
        }
        console.log(p==q)

        // Object shortcuts

         product = {
         company:'Mango',
         price:861,
         'item_name': 'T-shirt',
         rating:{
            stars:4.5,
            noOfReviews:87
         },
         displayPrice(){
            return `${this.price}`
         }
        };
        // destructuring

        let {company,price}=product
        console.log(company,price)

    </script>
</body>
</html>
