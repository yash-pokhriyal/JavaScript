<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice</title>
</head>
<body>
    <!-- Give a discount of female 50% kid with age under 5 are free .kids up to 8 yers have half ticket -->
    <!-- People over 65 years of age only pay 30% -->
    <!-- In case of multiple discount max discount will be applied -->

    <script>
        let age = 4;
        let gender = 'female'; //male and female
        let finalDiscount;
        if (age<=5){
            finalDiscount=100;
        }else if(gender === 'female' || (age<=8)){
            finalDiscount = 50;
        }else if(age>=65){
            finalDiscount = 30;
        }else{
            finalDiscount=0
        }

        console.log(`Your final discount is ${finalDiscount}`);
    </script>

</body>
</html>
